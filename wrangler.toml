# Cloudflare Workers configuration — pozytywniezbudowani.pl
#
# MIGRACJA 2026-06-10 (F3 planu aios-workspace/plans/active/2026-06-10-pz-analytics-faza1-2-wdrozenie.md):
# Pages-config → Workers-config. Strona działa na Workers (worker `pozytywniezbudowani-astro`)
# od migracji 2026-05/06; wcześniej deploy szedł flagami CLI (--assets=dist) BEZ tego pliku.
# Teraz config-driven: worker entry (src/worker.ts) obsługuje POST /api/perf-beacon → D1,
# wszystko inne → static assets (dist).
#
# DEPLOY (zastępuje stare flagi CLI — zaktualizowano w .claude/skills/pz-site):
#   cd /home/wojtek/pozytywniezbudowani-astro && npm run build
#   CLOUDFLARE_API_KEY=.. CLOUDFLARE_EMAIL=.. CLOUDFLARE_ACCOUNT_ID=9223d76b74b405b33f1504d4162f8381 \
#     npx wrangler deploy
#   (+ purge cache zone CLOUDFLARE_ZONE_ID_PZ — patrz pz-site reference)
#
# Telemetria: plans (AIOS): 2026-04-15-pz-real-user-timing-telemetry.md (TOR 2)
# D1 utworzona 2026-06-10: pz-perf-telemetry

name = "pozytywniezbudowani-astro"
main = "src/worker.ts"
compatibility_date = "2026-05-25"

[assets]
directory = "dist"
binding = "ASSETS"

[[d1_databases]]
binding = "PERF_TELEMETRY"
database_name = "pz-perf-telemetry"
database_id = "6976a420-0f4e-4e5b-ad56-fdca885f8400"
